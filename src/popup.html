<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Page Tools</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 280px;
        font-family: 'Segoe UI', sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 16px;
      }
      h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #cba6f7; }
      .btn {
        width: 100%;
        padding: 10px;
        margin-bottom: 8px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
      }
      .btn-info { background: #cba6f7; color: #1e1e2e; }
      .btn-trans { background: #313244; color: #cdd6f4; }
      .btn:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <h1>Page Tools</h1>
    <button class="btn btn-info" id="btnInfo">Показать инфо о странице</button>
    <script src="js/popup.js"></script>
  </body>
</html>
